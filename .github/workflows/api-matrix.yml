name: api-matrix

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  public-api:
    name: public api py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            cargo-features: abi3-py310
          - python-version: "3.11"
            cargo-features: abi3-py311
          - python-version: "3.12"
            cargo-features: abi3-py311
          - python-version: "3.13"
            cargo-features: abi3-py311
          - python-version: "3.14"
            cargo-features: abi3-py311
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: 0.11.12
      - uses: dtolnay/rust-toolchain@1.97.0
      - name: Sync dependencies
        run: uv sync --locked --group dev
      - name: Build editable extension
        run: uv run --locked --group dev maturin develop --no-default-features --features ${{ matrix.cargo-features }}
      - name: Run public API tests
        run: uv run --locked --group dev pytest tests/test_api_surface.py tests/test_optimize_file_api.py tests/test_optimize_memory_api.py tests/test_option_validation.py tests/test_pyoxipng_compat.py tests/test_raw_image_api.py -v -ra
