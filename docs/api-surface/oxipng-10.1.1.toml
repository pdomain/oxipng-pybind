upstream_version = "10.1.1"
manifest_scope = "Tracks upstream oxipng surface mapped or intentionally not mapped by this package. Python-only options such as backup and preserve_attrs are documented in stubs and usage docs."

[functions]
exposed = ["optimize", "optimize_from_memory"]

[classes]
exposed = ["RawImage"]

[classes.RawImage.methods]
constructor = "RawImage(width, height, color_type, bit_depth, data, *, palette=None, transparent=None)"
create_optimized_png = "RawImage.create_optimized_png(**memory_options)"
add_png_chunk = "RawImage.add_png_chunk(name, data)"
add_icc_profile = "RawImage.add_icc_profile(data)"

[options.exposed]
level = "Options::from_preset"
interlace = "Options.interlace"
strip = "Options.strip"
deflate = "Options.deflater"
filter = "Options.filters"
fix_errors = "Options.fix_errors"
force = "Options.force"

[options.unexposed]
optimize_alpha = "lossy transparent-pixel optimization deferred"
bit_depth_reduction = "kept at preset value"
color_type_reduction = "kept at preset value"
palette_reduction = "kept at preset value"
grayscale_reduction = "kept at preset value"
idat_recoding = "kept at preset value"
scale_16 = "kept at preset value"
fast_evaluation = "kept at preset value"
timeout = "timeout policy deferred"
max_decompressed_size = "resource-limit policy deferred"

[enums.Interlacing.exposed]
keep = "Options.interlace = None"
off = "Options.interlace = Some(false)"
on = "Options.interlace = Some(true)"

[enums.StripChunks.exposed]
none = "StripChunks::None"
safe = "StripChunks::Safe"
all = "StripChunks::All"

[enums.StripChunks.unexposed]
Strip = "requires chunk-name parsing policy"
Keep = "requires chunk-name parsing policy"

[enums.Deflater.exposed]
libdeflater = "Deflater::Libdeflater"
zopfli = "Deflater::Zopfli(Default::default())"

[enums.FilterStrategy.exposed]
none = "FilterStrategy::Basic(RowFilter::None)"
sub = "FilterStrategy::Basic(RowFilter::Sub)"
up = "FilterStrategy::Basic(RowFilter::Up)"
average = "FilterStrategy::Basic(RowFilter::Average)"
paeth = "FilterStrategy::Basic(RowFilter::Paeth)"
minsum = "FilterStrategy::MinSum"
entropy = "FilterStrategy::Entropy"
bigrams = "FilterStrategy::Bigrams"
bigent = "FilterStrategy::BigEnt"
brute = "FilterStrategy::Brute { num_lines: 3, level: 1 }"

[enums.FilterStrategy.unexposed]
Predefined = "requires per-row filter input API"

[enums.ColorType.exposed]
grayscale = "ColorType::Grayscale"
rgb = "ColorType::RGB"
indexed = "ColorType::Indexed"
grayscale_alpha = "ColorType::GrayscaleAlpha"
rgba = "ColorType::RGBA"

[enums.BitDepth.exposed]
one = "BitDepth::One"
two = "BitDepth::Two"
four = "BitDepth::Four"
eight = "BitDepth::Eight"
sixteen = "BitDepth::Sixteen"

[enums.RowFilter.unexposed]
None = "exposed through FilterStrategy.none, not as a public RowFilter enum"
Sub = "exposed through FilterStrategy.sub, not as a public RowFilter enum"
Up = "exposed through FilterStrategy.up, not as a public RowFilter enum"
Average = "exposed through FilterStrategy.average, not as a public RowFilter enum"
Paeth = "exposed through FilterStrategy.paeth, not as a public RowFilter enum"

[notes]
interlacing = "Python Interlacing.keep maps to leaving Options.interlace unchanged as None."
libdeflater = "Python Deflater.libdeflater preserves the preset compression level."
brute = "Python FilterStrategy.brute collapses to Brute { num_lines: 3, level: 1 }."
