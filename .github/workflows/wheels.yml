name: wheels

on:
  workflow_dispatch:
    inputs:
      publish-target:
        description: "Optional publish target for verified artifacts"
        type: choice
        required: true
        default: none
        options:
          - none
          - testpypi
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/wheels.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pyproject.toml"
      - "oxipng/**"
      - "scripts/check_wheel_tags.py"
      - "scripts/validate_release_tag.py"
      - "scripts/verify_release_artifacts.py"
      - "scripts/smoke_wheel.py"
      - "src/**"
      - "tests/**"
      - "docs/process/release-artifacts.md"

permissions:
  contents: read

jobs:
  wait-for-release-checks:
    name: wait for release checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Wait for required checks on tag commit
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.publish-target }}" != "testpypi" ]; then
              echo "release checks are only required for tag pushes and TestPyPI rehearsals"
              exit 0
            fi
          elif [ "${{ github.event_name }}" != "push" ] || [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
            echo "release checks are only required for tag pushes and TestPyPI rehearsals"
            exit 0
          fi

          sha="${GITHUB_SHA}"
          if [ "${{ github.event_name }}" = "push" ] && [[ "${GITHUB_REF}" = refs/tags/v* ]]; then
            peeled_sha="$(
              git ls-remote "https://github.com/${{ github.repository }}.git" "refs/tags/${GITHUB_REF_NAME}^{}" |
                awk '{ print $1 }'
            )"
            if [ -n "$peeled_sha" ]; then
              sha="$peeled_sha"
            fi
          fi

          wait_for_workflow() {
            local workflow="$1"
            local label="$2"
            for attempt in $(seq 1 80); do
              conclusion="$({
                gh run list --repo "${{ github.repository }}" --workflow "$workflow" --commit "$sha" \
                  --json status,conclusion \
                  --jq '.[0] | "\(.status) \(.conclusion)"'
              })"
              case "$conclusion" in
                "completed success")
                  echo "$label succeeded"
                  return 0
                  ;;
                "completed failure"|"completed cancelled"|"completed timed_out"|"completed neutral"|"completed skipped")
                  echo "$label failed: $conclusion"
                  return 1
                  ;;
              esac
              sleep 30
            done
            echo "timed out waiting for $label"
            return 1
          }

          wait_for_workflow "ci.yml" "CI"
          wait_for_workflow "api-matrix.yml" "API matrix"

  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    needs:
      - wait-for-release-checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: wheels-linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            expected-platform: manylinux_2_28_x86_64
            python: "3.10"
            expected-python: cp310
            cargo-features: abi3-py310
            smoke-extra: ""
            smoke-args: --stdlib-png
            smoke: true
          - artifact: wheels-linux-x86_64-py311
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            expected-platform: manylinux_2_28_x86_64
            python: "3.11"
            expected-python: cp311
            cargo-features: abi3-py311
            smoke-extra: "pillow==12.2.0"
            smoke-args: ""
            smoke: true
          - artifact: wheels-linux-aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            expected-platform: manylinux_2_28_aarch64
            python: "3.10"
            expected-python: cp310
            cargo-features: abi3-py310
            smoke-extra: ""
            smoke-args: --stdlib-png
            smoke: true
          - artifact: wheels-linux-aarch64-py311
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            expected-platform: manylinux_2_28_aarch64
            python: "3.11"
            expected-python: cp311
            cargo-features: abi3-py311
            smoke-extra: "pillow==12.2.0"
            smoke-args: ""
            smoke: true
          - artifact: wheels-macos-x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            expected-platform: macosx_*_x86_64
            python: "3.10"
            expected-python: cp310
            cargo-features: abi3-py310
            smoke-extra: ""
            smoke-args: --stdlib-png
            smoke: true
          - artifact: wheels-macos-x86_64-py311
            runner: macos-15-intel
            target: x86_64-apple-darwin
            expected-platform: macosx_*_x86_64
            python: "3.11"
            expected-python: cp311
            cargo-features: abi3-py311
            smoke-extra: "pillow==12.2.0"
            smoke-args: ""
            smoke: true
          - artifact: wheels-macos-aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
            expected-platform: macosx_*_arm64
            python: "3.10"
            expected-python: cp310
            cargo-features: abi3-py310
            smoke-extra: ""
            smoke-args: --stdlib-png
            smoke: true
          - artifact: wheels-macos-aarch64-py311
            runner: macos-latest
            target: aarch64-apple-darwin
            expected-platform: macosx_*_arm64
            python: "3.11"
            expected-python: cp311
            cargo-features: abi3-py311
            smoke-extra: "pillow==12.2.0"
            smoke-args: ""
            smoke: true
          - artifact: wheels-windows-x86_64
            runner: windows-latest
            target: x64
            expected-platform: win_amd64
            python: "3.10"
            expected-python: cp310
            cargo-features: abi3-py310
            smoke-extra: ""
            smoke-args: --stdlib-png
            smoke: true
          - artifact: wheels-windows-x86_64-py311
            runner: windows-latest
            target: x64
            expected-platform: win_amd64
            python: "3.11"
            expected-python: cp311
            cargo-features: abi3-py311
            smoke-extra: "pillow==12.2.0"
            smoke-args: ""
            smoke: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@1.96.0
      - name: Set TestPyPI version
        if: github.event_name == 'workflow_dispatch' && inputs.publish-target == 'testpypi'
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          path = Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")
          match = re.search(r'(?m)^version = "([^"]+)"$', text)
          if match is None:
              raise SystemExit("pyproject.toml project version not found")
          base_version = match.group(1)
          run_number = os.environ["GITHUB_RUN_NUMBER"]
          run_attempt = int(os.environ["GITHUB_RUN_ATTEMPT"])
          dev_number = int(f"{run_number}{run_attempt:02d}")
          test_version = f"{base_version}.dev{dev_number}"
          path.write_text(
              re.sub(r'(?m)^version = "[^"]+"$', f'version = "{test_version}"', text, count=1),
              encoding="utf-8",
          )
          print(f"TestPyPI version: {test_version}")
          PY
      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          command: build
          args: --release --locked --out dist --interpreter python${{ matrix.python }} --no-default-features --features ${{ matrix.cargo-features }}
          manylinux: "2_28"
          target: ${{ matrix.target }}
      - name: Check wheel tags
        shell: bash
        run: python scripts/check_wheel_tags.py --expected-python "${{ matrix.expected-python }}" --expected-platform "${{ matrix.expected-platform }}" dist/*.whl
      - name: Verify wheel artifact contents
        shell: bash
        run: python scripts/verify_release_artifacts.py dist/*.whl
      - name: Smoke wheel
        if: matrix.smoke
        shell: bash
        run: |
          python -m venv .wheel-smoke
          if [ -x .wheel-smoke/Scripts/python.exe ]; then
            smoke_python=.wheel-smoke/Scripts/python.exe
          else
            smoke_python=.wheel-smoke/bin/python
          fi
          "$smoke_python" -m pip install dist/*.whl ${{ matrix.smoke-extra }}
          "$smoke_python" scripts/smoke_wheel.py ${{ matrix.smoke-args }}
      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ matrix.artifact }}
          path: dist/*.whl

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    needs:
      - wait-for-release-checks
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.10"
      - uses: dtolnay/rust-toolchain@1.96.0
      - name: Set TestPyPI version
        if: github.event_name == 'workflow_dispatch' && inputs.publish-target == 'testpypi'
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          path = Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")
          match = re.search(r'(?m)^version = "([^"]+)"$', text)
          if match is None:
              raise SystemExit("pyproject.toml project version not found")
          base_version = match.group(1)
          run_number = os.environ["GITHUB_RUN_NUMBER"]
          run_attempt = int(os.environ["GITHUB_RUN_ATTEMPT"])
          dev_number = int(f"{run_number}{run_attempt:02d}")
          test_version = f"{base_version}.dev{dev_number}"
          path.write_text(
              re.sub(r'(?m)^version = "[^"]+"$', f'version = "{test_version}"', text, count=1),
              encoding="utf-8",
          )
          print(f"TestPyPI version: {test_version}")
          PY
      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          command: sdist
          args: --out dist
      - name: Verify sdist artifact contents
        shell: bash
        run: python scripts/verify_release_artifacts.py dist/*.tar.gz
      - name: Build wheel from sdist
        shell: bash
        run: |
          python -m venv .sdist-smoke
          .sdist-smoke/bin/python -m pip wheel --no-deps --wheel-dir source-wheel dist/*.tar.gz
          python scripts/verify_release_artifacts.py source-wheel/*.whl
          .sdist-smoke/bin/python -m pip install source-wheel/*.whl
          .sdist-smoke/bin/python -c "import oxipng; assert callable(oxipng.optimize)"
      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sdist
          path: dist/*.tar.gz

  validate-release-tag:
    name: validate release tag
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    outputs:
      release-version: ${{ steps.validate.outputs.release-version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      - name: Validate release tag
        id: validate
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "push" ] || [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
            echo "release-version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python scripts/validate_release_tag.py --tag "$GITHUB_REF_NAME"
          version="${GITHUB_REF_NAME#v}"
          echo "release-version=$version" >> "$GITHUB_OUTPUT"

  publish:
    name: publish
    runs-on: ubuntu-latest
    needs:
      - build
      - sdist
      - validate-release-tag
    if: github.event_name == 'push' && needs.validate-release-tag.outputs.release-version != ''
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: dist
          merge-multiple: true
      - name: Verify release artifact set
        run: python scripts/verify_release_artifacts.py dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist

  publish-testpypi:
    name: publish-testpypi
    runs-on: ubuntu-latest
    needs:
      - build
      - sdist
    if: github.event_name == 'workflow_dispatch' && inputs.publish-target == 'testpypi'
    environment: testpypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: dist
          merge-multiple: true
      - name: Verify release artifact set
        run: python scripts/verify_release_artifacts.py dist/*
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/
