name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.13"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: 0.11.12
      - uses: dtolnay/rust-toolchain@1.85.1
      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.7 --locked
      - run: make ci
