name: dependency-health

on:
  workflow_dispatch:
  schedule:
    - cron: "31 10 * * 2"

permissions:
  contents: read

jobs:
  prepare:
    name: refresh and verify dependencies
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
      changed-paths: ${{ steps.changes.outputs.paths }}
      release-needed: ${{ steps.classification.outputs.release-needed }}
      release-label: ${{ steps.classification.outputs.label }}
      release-reason: ${{ steps.classification.outputs.reason }}
    env:
      UV_PYTHON: "3.13"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: 0.11.12
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy
      - name: Install cargo-deny
        uses: taiki-e/install-action@60ae4ce63c7aeb6e96d7f572c1ec7fafbb17ca80
        with:
          tool: cargo-deny@0.19.7
      - name: Refresh lockfiles
        run: |
          uv lock --upgrade
          cargo update
      - name: Sync refreshed dependencies
        run: uv sync --locked --group dev
      - name: Refresh pre-commit hooks
        run: uv run --locked --group dev pre-commit autoupdate
      - name: Refresh GitHub Actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: uv run --locked --group dev python scripts/update_github_actions.py
      - name: Apply lint and generated-file fixes
        run: make lint-fix
      - name: Generate third-party notices
        run: make third-party-notices
      - name: Run dependency audits
        run: make dependency-audit
      - name: Run CI
        run: make ci
      - name: Check for changes
        id: changes
        run: |
          paths="$({
            git diff --name-only
            git ls-files --others --exclude-standard
          } | sort -u)"
          if [ -z "$paths" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "paths<<EOF"
              echo "$paths"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Classify dependency refresh
        id: classification
        if: steps.changes.outputs.changed == 'true'
        run: uv run --locked --group dev python scripts/classify_dependency_refresh.py --base-ref origin/main
      - name: Upload dependency refresh workspace
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dependency-refresh
          include-hidden-files: true
          path: ${{ steps.changes.outputs.paths }}

  publish:
    name: open dependency refresh PR
    needs: prepare
    if: needs.prepare.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: dependency-refresh
          path: .
      - name: Require dependency refresh token
        env:
          DEPENDENCY_REFRESH_TOKEN: ${{ secrets.DEPENDENCY_REFRESH_TOKEN }}
        run: |
          if [ -z "$DEPENDENCY_REFRESH_TOKEN" ]; then
            echo "DEPENDENCY_REFRESH_TOKEN is required so refresh PRs trigger normal CI." >&2
            exit 1
          fi
      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          token: ${{ secrets.DEPENDENCY_REFRESH_TOKEN }}
          commit-message: "chore: refresh dependency lockfiles"
          title: "chore: refresh dependency lockfiles"
          body: |
            Automated dependency refresh.

            Verification run in the prepare job:

            - `uv run --locked --group dev pre-commit autoupdate`
            - `uv run --locked --group dev python scripts/update_github_actions.py`
            - `make lint-fix`
            - `make dependency-audit`
            - `make ci`

            Release classification:

            - `${{ needs.prepare.outputs.release-label }}`
            - `${{ needs.prepare.outputs.release-reason }}`

            `no-release-needed` PRs auto-merge after required checks pass.
            `release-needed` PRs stay open for an explicit wrapper version bump
            before merge.
          branch: automation/dependency-refresh
          delete-branch: true
          labels: dependencies, automated, ${{ needs.prepare.outputs.release-label }}
          add-paths: ${{ needs.prepare.outputs.changed-paths }}
      - name: Enable auto-merge
        if: >-
          needs.prepare.outputs.release-needed == 'false' &&
          steps.cpr.outputs.pull-request-number != '' &&
          contains(fromJSON('["created", "updated"]'), steps.cpr.outputs.pull-request-operation)
        env:
          GH_TOKEN: ${{ secrets.DEPENDENCY_REFRESH_TOKEN }}
        run: |
          gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --auto --rebase --delete-branch
