name: ci

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pre-commit:
    name: pre-commit checks
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.13"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: 0.11.12
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy,rustfmt
      - name: Sync dependencies
        run: uv sync --locked --group dev
      - run: make pre-commit-check

  python-tests:
    name: python tests
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.13"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: 0.11.12
      - uses: dtolnay/rust-toolchain@1.96.0
      - name: Sync dependencies
        run: uv sync --locked --group dev
      - run: make test-py

  rust-tests:
    name: rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: dtolnay/rust-toolchain@1.96.0
      - run: make test-rust

  dependency-audit:
    name: dependency audit
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.13"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: 0.11.12
      - uses: dtolnay/rust-toolchain@1.96.0
      - name: Install cargo-deny
        uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6
        with:
          tool: cargo-deny@0.19.7
      - name: Sync dependencies
        run: uv sync --locked --group dev
      - run: make dependency-audit

  release-files:
    name: release file checks
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.13"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: 0.11.12
      - uses: dtolnay/rust-toolchain@1.96.0
      - name: Sync dependencies
        run: uv sync --locked --group dev
      - run: make third-party-notices-check
      - run: make wheel
