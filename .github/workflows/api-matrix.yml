name: api-matrix

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  public-api:
    name: public api py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: 0.11.12
      - uses: dtolnay/rust-toolchain@1.95.0
      - name: Sync dependencies
        run: uv sync --locked --group dev
      - name: Build editable extension
        run: uv run --locked --group dev maturin develop
      - name: Run public API tests
        run: uv run --locked --group dev pytest tests/test_api.py -v -ra
