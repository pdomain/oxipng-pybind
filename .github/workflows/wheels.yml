name: wheels

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/wheels.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pyproject.toml"
      - "oxipng/**"
      - "scripts/check_wheel_tags.py"
      - "scripts/verify_release_artifacts.py"
      - "scripts/smoke_wheel.py"
      - "src/**"
      - "tests/**"
      - "docs/process/release-artifacts.md"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: wheels-linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            expected-platform: manylinux_2_28_x86_64
            smoke: true
          - artifact: wheels-linux-aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            expected-platform: manylinux_2_28_aarch64
            smoke: true
          - artifact: wheels-macos-x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            expected-platform: macosx_*_x86_64
            smoke: true
          - artifact: wheels-macos-aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
            expected-platform: macosx_*_arm64
            smoke: true
          - artifact: wheels-windows-x86_64
            runner: windows-latest
            target: x64
            expected-platform: win_amd64
            smoke: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@1.85.1
      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          command: build
          args: --release --locked --out dist --interpreter python3.11
          manylinux: "2_28"
          target: ${{ matrix.target }}
      - name: Check wheel tags
        shell: bash
        run: python scripts/check_wheel_tags.py --expected-python cp311 --expected-platform "${{ matrix.expected-platform }}" dist/*.whl
      - name: Verify wheel artifact contents
        shell: bash
        run: python scripts/verify_release_artifacts.py dist/*.whl
      - name: Smoke wheel
        if: matrix.smoke
        shell: bash
        run: |
          python -m venv .wheel-smoke
          if [ -x .wheel-smoke/Scripts/python.exe ]; then
            smoke_python=.wheel-smoke/Scripts/python.exe
          else
            smoke_python=.wheel-smoke/bin/python
          fi
          "$smoke_python" -m pip install dist/*.whl "pillow==12.2.0"
          "$smoke_python" scripts/smoke_wheel.py
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*.whl

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@1.85.1
      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          command: sdist
          args: --out dist
      - name: Verify sdist artifact contents
        shell: bash
        run: python scripts/verify_release_artifacts.py dist/*.tar.gz
      - name: Build wheel from sdist
        shell: bash
        run: |
          python -m venv .sdist-smoke
          .sdist-smoke/bin/python -m pip wheel --no-deps --wheel-dir source-wheel dist/*.tar.gz
          python scripts/verify_release_artifacts.py source-wheel/*.whl
          .sdist-smoke/bin/python -m pip install source-wheel/*.whl
          .sdist-smoke/bin/python -c "import oxipng; assert callable(oxipng.optimize)"
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: publish
    runs-on: ubuntu-latest
    needs:
      - build
      - sdist
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist
