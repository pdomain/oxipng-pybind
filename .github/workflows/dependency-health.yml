name: dependency-health

on:
  workflow_dispatch:
  schedule:
    - cron: "31 10 * * 2"

permissions:
  contents: read

jobs:
  prepare:
    name: refresh and verify dependencies
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
      changed-paths: ${{ steps.changes.outputs.paths }}
      ci-passed: ${{ steps.ci.outputs.ci-passed }}
      release-needed: ${{ steps.classification.outputs.release-needed }}
      release-label: ${{ steps.classification.outputs.label }}
      release-reason: ${{ steps.classification.outputs.reason }}
    env:
      UV_PYTHON: "3.13"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: 0.11.12
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy
      - name: Install cargo-deny
        uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6
        with:
          tool: cargo-deny@0.19.7
      - name: Refresh lockfiles
        run: |
          uv lock --upgrade
          cargo update
      - name: Sync refreshed dependencies
        run: uv sync --locked --group dev
      - name: Refresh pre-commit hooks
        run: uv run --locked --group dev pre-commit autoupdate
      - name: Refresh GitHub Actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: uv run --locked --group dev python scripts/update_github_actions.py
      - name: Apply lint and generated-file fixes
        run: make lint-fix
      - name: Generate third-party notices
        run: make third-party-notices
      - name: Run dependency audits
        run: make dependency-audit
      - name: Run CI
        id: ci
        # A post-bump CI failure is expected when an unreviewed GitHub Action
        # SHA trips the reviewed-action-ref security gate. Record the outcome so
        # the publish job can surface it, but do not abort the job: the refresh
        # must still open a PR for human review. continue-on-error keeps the red
        # result visible in the run while letting later steps run, and the
        # explicit ci-passed output is what gates auto-merge.
        continue-on-error: true
        run: |
          if make ci; then
            echo "ci-passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "ci-passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
      - name: Check for changes
        id: changes
        if: always()
        run: |
          paths="$({
            git diff --name-only
            git ls-files --others --exclude-standard
          } | sort -u)"
          if [ -z "$paths" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "paths<<EOF"
              echo "$paths"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Classify dependency refresh
        id: classification
        if: steps.changes.outputs.changed == 'true'
        run: uv run --locked --group dev python scripts/classify_dependency_refresh.py --base-ref origin/main
      - name: Upload dependency refresh workspace
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dependency-refresh
          include-hidden-files: true
          path: ${{ steps.changes.outputs.paths }}

  publish:
    name: open dependency refresh PR
    needs: prepare
    if: needs.prepare.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: dependency-refresh
          path: .
      - name: Require dependency refresh token
        env:
          DEPENDENCY_REFRESH_TOKEN: ${{ secrets.DEPENDENCY_REFRESH_TOKEN }}
        run: |
          if [ -z "$DEPENDENCY_REFRESH_TOKEN" ]; then
            echo "DEPENDENCY_REFRESH_TOKEN is required so refresh PRs trigger normal CI." >&2
            exit 1
          fi
      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          token: ${{ secrets.DEPENDENCY_REFRESH_TOKEN }}
          commit-message: "chore: refresh dependency lockfiles"
          title: "chore: refresh dependency lockfiles"
          body: |
            Automated dependency refresh.

            Prepare-job local CI result: `ci-passed=${{ needs.prepare.outputs.ci-passed }}`.

            When `ci-passed=false` the refresh tripped the local CI gate — most
            often the reviewed-action-ref security check rejecting a freshly
            bumped GitHub Action SHA. Review the new pins before merging; this PR
            does **not** auto-merge while CI is red.

            Verification run in the prepare job:

            - `uv run --locked --group dev pre-commit autoupdate`
            - `uv run --locked --group dev python scripts/update_github_actions.py`
            - `make lint-fix`
            - `make dependency-audit`
            - `make ci`

            Release classification:

            - `${{ needs.prepare.outputs.release-label }}`
            - `${{ needs.prepare.outputs.release-reason }}`

            `no-release-needed` PRs with green CI auto-merge after required checks
            pass. `release-needed` PRs, and any PR whose prepare-job CI was red,
            stay open for human review before merge.
          branch: automation/dependency-refresh
          delete-branch: true
          labels: >-
            dependencies, automated, ${{ needs.prepare.outputs.release-label }},
            ${{ needs.prepare.outputs.ci-passed == 'true' && 'ci-passed' || 'ci-failed' }}
          add-paths: ${{ needs.prepare.outputs.changed-paths }}
      - name: Enable auto-merge
        # SAFETY: never auto-merge a red refresh. Auto-merge requires the
        # prepare-job CI to have passed; a red refresh opens as a normal PR
        # awaiting human review.
        if: >-
          needs.prepare.outputs.ci-passed == 'true' &&
          needs.prepare.outputs.release-needed == 'false' &&
          steps.cpr.outputs.pull-request-number != '' &&
          contains(fromJSON('["created", "updated"]'), steps.cpr.outputs.pull-request-operation)
        env:
          GH_TOKEN: ${{ secrets.DEPENDENCY_REFRESH_TOKEN }}
        run: |
          gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --auto --rebase --delete-branch
